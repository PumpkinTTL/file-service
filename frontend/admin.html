<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Service - 管理后台</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <style>
    /* ============================================================
       CSS Custom Properties — Design System
       ============================================================ */
    :root {
      --primary: #2563EB;
      --primary-hover: #1D4ED8;
      --primary-light: #EFF6FF;
      --primary-ring: rgba(37,99,235,0.15);
      --secondary: #3B82F6;
      --accent: #F97316;
      --accent-hover: #EA580C;
      --accent-light: #FFF7ED;
      --accent-ring: rgba(249,115,22,0.15);
      --success: #16A34A;
      --success-light: #F0FDF4;
      --success-ring: rgba(22,163,74,0.12);
      --danger: #DC2626;
      --danger-light: #FEF2F2;
      --danger-ring: rgba(220,38,38,0.12);
      --warning: #D97706;
      --warning-light: #FFFBEB;
      --warning-ring: rgba(217,119,6,0.12);
      --bg: #F8FAFC;
      --bg-card: #FFFFFF;
      --bg-sidebar: #FFFFFF;
      --bg-subtle: #F1F5F9;
      --text: #1E293B;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --shadow-xs: 0 1px 2px rgba(0,0,0,0.03);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
      --shadow-xl: 0 25px 60px rgba(0,0,0,0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --radius-full: 9999px;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --sidebar-w: 260px;
    }

    /* ============================================================
       Base Reset
       ============================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============================================================
       Layout
       ============================================================ */
    .layout { display: flex; min-height: 100vh; }

    /* ============================================================
       Sidebar
       ============================================================ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
      transition: var(--transition);
    }

    .sidebar-brand {
      padding: 28px 24px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .sidebar-brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
    }

    .sidebar-brand-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
    }

    .sidebar-brand-text {
      display: flex;
      flex-direction: column;
    }

    .sidebar-brand-text span {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .sidebar-brand-text small {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .sidebar-nav {
      padding: 20px 14px;
      flex: 1;
      overflow-y: auto;
      position: relative;
      z-index: 1;
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 0 10px;
      margin-bottom: 8px;
      margin-top: 24px;
    }

    .sidebar-label:first-child { margin-top: 0; }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-secondary);
      position: relative;
      user-select: none;
      margin-bottom: 2px;
    }

    .sidebar-item:hover {
      background: var(--bg-subtle);
      color: var(--text);
    }

    .sidebar-item.active {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }

    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: -14px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 20px;
      background: var(--primary);
      border-radius: 0 4px 4px 0;
    }

    .sidebar-item svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .sidebar-item.active svg { opacity: 1; }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .btn-logout {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      background: none;
      border: none;
      font-family: inherit;
      padding: 8px 10px;
      width: 100%;
      border-radius: var(--radius-xs);
    }

    .btn-logout:hover {
      color: var(--danger);
      background: var(--danger-light);
    }

    .btn-logout svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ============================================================
       Mobile Menu Toggle — CSS-only (checkbox hack)
       ============================================================ */
    .sidebar-checkbox {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .menu-toggle {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 200;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      color: var(--text-secondary);
    }

    .menu-toggle:hover {
      background: var(--bg-subtle);
      color: var(--text);
      box-shadow: var(--shadow-md);
    }

    .menu-toggle svg {
      width: 20px;
      height: 20px;
      pointer-events: none;
    }

    /* Mobile overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.4);
      z-index: 99;
      opacity: 0;
      transition: opacity 0.25s ease;
      cursor: pointer;
    }

    /* Checkbox-driven states */
    .sidebar-checkbox:checked ~ .sidebar-overlay {
      display: block;
      opacity: 1;
    }

    .sidebar-checkbox:checked ~ .sidebar {
      transform: translateX(0);
      box-shadow: var(--shadow-md);
    }

    /* ============================================================
       Main Content
       ============================================================ */
    .main {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 32px;
      overflow-y: auto;
      max-width: 100%;
      min-height: 100vh;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 14px;
      flex-wrap: wrap;
    }

    .main-header-left {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .main-header-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      flex-shrink: 0;
    }

    .main-header-icon svg { width: 22px; height: 22px; }

    .main-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    .main-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 400;
    }

    /* ============================================================
       Stats Cards
       ============================================================ */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      padding: 18px 22px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-xs);
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }

    .stat-card:hover {
      box-shadow: var(--shadow-md);
    }

    .stat-card-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .stat-card-icon.blue {
      background: var(--primary-light);
      color: var(--primary);
    }

    .stat-card-icon.green {
      background: var(--success-light);
      color: var(--success);
    }

    .stat-card-icon.orange {
      background: var(--accent-light);
      color: var(--accent);
    }

    .stat-card-icon svg { width: 22px; height: 22px; }

    .stat-card-body { flex: 1; }

    .stat-card-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .stat-card-value.blue { color: var(--primary); }
    .stat-card-value.green { color: var(--success); }

    .stat-card-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    /* ============================================================
       Table Card
       ============================================================ */
    .table-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }

    .table-card:hover {
      box-shadow: var(--shadow-md);
    }

    .table-header {
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .table-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .table-title svg {
      width: 16px;
      height: 16px;
      color: var(--primary);
    }

    /* Table Wrapper for horizontal scroll */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }

    thead {
      background: var(--bg);
    }

    th {
      padding: 12px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 14px 20px;
      font-size: 14px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-secondary);
      vertical-align: middle;
    }

    tbody tr {
      transition: var(--transition);
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover td {
      background: #FAFBFC;
    }

    /* Odd/even row styling */
    tbody tr:nth-child(even) td {
      background: #FAFBFC;
    }

    tbody tr:nth-child(even):hover td {
      background: #F1F5F9;
    }

    .td-mono {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .td-actions {
      white-space: nowrap;
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
    }

    /* ============================================================
       Buttons
       ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-xs);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: var(--transition);
      font-family: inherit;
      line-height: 1.4;
      white-space: nowrap;
      user-select: none;
      text-decoration: none;
    }

    .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-danger {
      background: var(--danger-light);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: #FEE2E2;
    }

    .btn-warning {
      background: var(--warning-light);
      color: var(--warning);
    }

    .btn-warning:hover {
      background: #FEF3C7;
    }

    .btn-success {
      background: var(--success-light);
      color: var(--success);
    }

    .btn-success:hover {
      background: #DCFCE7;
    }

    .btn-ghost {
      background: var(--bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--bg-subtle);
      color: var(--text);
      border-color: var(--text-muted);
    }

    .btn-create {
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius-sm);
    }

    .btn-lg {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius-sm);
    }

    .btn-full {
      width: 100%;
      justify-content: center;
    }

    /* ============================================================
       Badge
       ============================================================ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
    }

    .badge-green {
      background: var(--success-light);
      color: var(--success);
    }

    .badge-red {
      background: var(--danger-light);
      color: var(--danger);
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge-green .badge-dot { background: var(--success); }
    .badge-red .badge-dot { background: var(--danger); }

    /* ============================================================
       Token Creation Form
       ============================================================ */
    .create-form {
      display: flex;
      gap: 14px;
      align-items: flex-end;
      padding: 20px 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .create-form .field {
      flex: 1;
      min-width: 160px;
    }

    .create-form label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .create-form input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: var(--transition);
      background: var(--bg-card);
      color: var(--text);
    }

    .create-form input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-ring);
    }

    .create-form input::placeholder {
      color: var(--text-muted);
    }

    /* ============================================================
       Pagination
       ============================================================ */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .pagination-info {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .pagination-info strong {
      color: var(--text);
      font-weight: 600;
    }

    .pagination-btns {
      display: flex;
      gap: 6px;
    }

    .pagination-btns button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      color: var(--text-secondary);
    }

    .pagination-btns button:hover:not(:disabled) {
      background: var(--bg-subtle);
      border-color: var(--text-muted);
      color: var(--text);
    }

    .pagination-btns button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .pagination-btns button.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* ============================================================
       Empty State
       ============================================================ */
    .empty {
      padding: 60px 24px;
      text-align: center;
      color: var(--text-muted);
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 18px;
      border-radius: var(--radius);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .empty-icon svg { width: 28px; height: 28px; }

    .empty p {
      font-size: 14px;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto;
    }

    /* ============================================================
       Modal — Glassmorphism
       ============================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 32px;
      width: 520px;
      max-width: 90vw;
      box-shadow: var(--shadow-md);
      animation: modalSlideUp 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .modal-success-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--success-light);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--success);
      flex-shrink: 0;
    }

    .modal-success-icon svg { width: 24px; height: 24px; }

    .modal-header-text h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .modal-header-text p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .modal p { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.5; }

    .token-display {
      background: var(--bg);
      padding: 16px 18px;
      border-radius: var(--radius);
      word-break: break-all;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      margin: 16px 0;
      border: 1px solid var(--border);
      border-left: 3px solid var(--primary);
      color: var(--text);
      line-height: 1.6;
      user-select: all;
    }

    .token-warning {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--warning-light);
      border: 1px solid #FDE68A;
      border-radius: var(--radius);
      padding: 14px 18px;
      color: #92400E;
      font-size: 13px;
      margin-top: 16px;
      line-height: 1.5;
    }

    .token-warning svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      margin-top: 1px;
      color: var(--warning);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .modal-actions .btn {
      flex: 1;
      justify-content: center;
      padding: 12px;
      font-weight: 600;
      font-size: 14px;
    }

    /* ============================================================
       Scrollbar Styling
       ============================================================ */
    .main::-webkit-scrollbar,
    .sidebar-nav::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .main::-webkit-scrollbar-track,
    .sidebar-nav::-webkit-scrollbar-track {
      background: transparent;
    }

    .main::-webkit-scrollbar-thumb,
    .sidebar-nav::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .main::-webkit-scrollbar-thumb:hover,
    .sidebar-nav::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* ============================================================
       Responsive — Tablet & Mobile
       ============================================================ */
    @media (max-width: 1024px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 900px) {
      .menu-toggle {
        display: flex;
      }

      .sidebar {
        transform: translateX(-100%);
      }

      .main {
        margin-left: 0;
        padding: 20px;
        padding-top: 64px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .create-form {
        flex-direction: column;
      }

      .create-form .field {
        min-width: 100%;
      }
    }

    @media (max-width: 600px) {
      .main-header-icon {
        display: none;
      }

      .modal {
        padding: 24px 20px;
        border-radius: 16px;
      }

      .modal-actions {
        flex-direction: column;
      }

      .pagination {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }

      .pagination-btns {
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .main {
        padding: 16px;
        padding-top: 60px;
      }

      .stat-card {
        padding: 16px 18px;
      }

      .table-header {
        padding: 14px 16px;
      }

      th, td {
        padding: 10px 14px;
        font-size: 13px;
      }

      .create-form {
        padding: 16px;
      }
    }

    /* ============================================================
       Reduced Motion
       ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="layout">
      <!-- Mobile Menu Toggle (CSS-only checkbox hack) -->
      <input type="checkbox" id="sidebar-toggle" class="sidebar-checkbox" />
      <label for="sidebar-toggle" class="menu-toggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </label>

      <!-- Mobile Overlay (clicking closes sidebar) -->
      <label for="sidebar-toggle" class="sidebar-overlay"></label>

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="sidebar-brand-text">
            <span>File Service</span>
            <small>管理后台</small>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="sidebar-label">概览</div>
          <div class="sidebar-item" :class="{ active: tab === 'files' }" @click="tab = 'files'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
            文件管理
          </div>
          <div class="sidebar-item" :class="{ active: tab === 'tokens' }" @click="tab = 'tokens'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
            Token 管理
          </div>
        </nav>
        <div class="sidebar-footer">
          <button class="btn-logout" @click="logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            退出登录
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main">
        <!-- Files Tab -->
        <template v-if="tab === 'files'">
          <div class="main-header">
            <div class="main-header-left">
              <div class="main-header-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
              </div>
              <div>
                <div class="main-title">文件管理</div>
                <div class="main-subtitle">管理所有上传的文件</div>
              </div>
            </div>
          </div>
          <div class="stats">
            <div class="stat-card">
              <div class="stat-card-icon blue">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
              </div>
              <div class="stat-card-body">
                <div class="stat-card-value blue">{{ files.total }}</div>
                <div class="stat-card-label">总文件数</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon green">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              </div>
              <div class="stat-card-body">
                <div class="stat-card-value green">{{ files.page }} / {{ files.totalPages || 1 }}</div>
                <div class="stat-card-label">当前页</div>
              </div>
            </div>
          </div>
          <div class="table-card">
            <div class="table-header">
              <div class="table-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                文件列表
              </div>
            </div>
            <div class="table-wrapper" v-if="files.items.length">
              <table>
                <thead><tr><th>ID</th><th>文件名</th><th>大小</th><th>类型</th><th>来源</th><th>上传时间</th><th>操作</th></tr></thead>
                <tbody>
                  <tr v-for="f in files.items" :key="f.id">
                    <td class="td-mono">{{ f.id }}</td>
                    <td style="font-weight:600;color:var(--text)">{{ f.originalName }}</td>
                    <td>{{ formatSize(f.size) }}</td>
                    <td><span style="font-size:12px;color:var(--text-muted)">{{ f.mimeType }}</span></td>
                    <td>{{ f.tokenName || '-' }}</td>
                    <td style="font-size:13px;color:var(--text-muted)">{{ formatDate(f.uploadedAt) }}</td>
                    <td>
                      <div class="td-actions">
                        <button class="btn btn-ghost" @click="copyUrl(f.fullUrl)">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                          复制
                        </button>
                        <button class="btn btn-danger" @click="deleteFile(f.id)">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                          删除
                        </button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div v-else class="empty">
              <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
              </div>
              <p>暂无文件</p>
            </div>
            <div class="pagination">
              <div class="pagination-info">共 <strong>{{ files.total }}</strong> 条记录</div>
              <div class="pagination-btns">
                <button @click="loadFiles(files.page - 1)" :disabled="files.page <= 1">上一页</button>
                <button @click="loadFiles(files.page + 1)" :disabled="files.page >= files.totalPages">下一页</button>
              </div>
            </div>
          </div>
        </template>

        <!-- Tokens Tab -->
        <template v-if="tab === 'tokens'">
          <div class="main-header">
            <div class="main-header-left">
              <div class="main-header-icon" style="background:var(--accent-light);color:var(--accent);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
              </div>
              <div>
                <div class="main-title">Token 管理</div>
                <div class="main-subtitle">管理 Upload Token 的创建、启用和轮换</div>
              </div>
            </div>
          </div>
          <div class="stats">
            <div class="stat-card">
              <div class="stat-card-icon orange">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
              </div>
              <div class="stat-card-body">
                <div class="stat-card-value blue">{{ tokens.total }}</div>
                <div class="stat-card-label">总 Token</div>
              </div>
            </div>
          </div>
          <div class="table-card">
            <div class="create-form">
              <div class="field"><label>名称 *</label><input v-model="newToken.name" placeholder="签发对象名称" /></div>
              <div class="field"><label>描述</label><input v-model="newToken.description" placeholder="可选描述" /></div>
              <div class="field"><label>过期时间</label><input v-model="newToken.expiresAt" type="datetime-local" /></div>
              <button class="btn btn-primary btn-create" @click="createToken">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                创建
              </button>
            </div>
            <div class="table-wrapper" v-if="tokens.items.length">
              <table>
                <thead><tr><th>ID</th><th>名称</th><th>前缀</th><th>描述</th><th>状态</th><th>最后使用</th><th>创建时间</th><th>操作</th></tr></thead>
                <tbody>
                  <tr v-for="t in tokens.items" :key="t.id">
                    <td class="td-mono">{{ t.id }}</td>
                    <td style="font-weight:600;color:var(--text)">{{ t.name }}</td>
                    <td class="td-mono">{{ t.tokenPrefix }}***</td>
                    <td style="color:var(--text-muted)">{{ t.description || '-' }}</td>
                    <td><span class="badge" :class="t.enabled ? 'badge-green' : 'badge-red'"><span class="badge-dot"></span>{{ t.enabled ? '启用' : '禁用' }}</span></td>
                    <td style="font-size:13px;color:var(--text-muted)">{{ t.lastUsedAt ? formatDate(t.lastUsedAt) : '-' }}</td>
                    <td style="font-size:13px;color:var(--text-muted)">{{ formatDate(t.createdAt) }}</td>
                    <td>
                      <div class="td-actions">
                        <button v-if="t.enabled" class="btn btn-warning" @click="toggleToken(t.id, false)">禁用</button>
                        <button v-else class="btn btn-success" @click="toggleToken(t.id, true)">启用</button>
                        <button class="btn btn-ghost" @click="rotateToken(t.id)">轮换</button>
                        <button class="btn btn-danger" @click="deleteToken(t.id)">删除</button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div v-else class="empty">
              <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
              </div>
              <p>暂无 Token，创建一个开始使用</p>
            </div>
            <div class="pagination">
              <div class="pagination-info">共 <strong>{{ tokens.total }}</strong> 条记录</div>
              <div class="pagination-btns">
                <button @click="loadTokens(tokens.page - 1)" :disabled="tokens.page <= 1">上一页</button>
                <button @click="loadTokens(tokens.page + 1)" :disabled="tokens.page >= tokens.totalPages">下一页</button>
              </div>
            </div>
          </div>
        </template>
      </main>
    </div>

    <!-- Token Modal -->
    <div v-if="tokenModal" class="modal-overlay" @click.self="tokenModal = null">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <div class="modal-header-text">
            <h3>Token 已创建</h3>
            <p>{{ tokenModal.name }}</p>
          </div>
        </div>
        <div class="token-display">{{ tokenModal.token }}</div>
        <div class="token-warning">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>此 Token 仅显示一次，关闭后无法再次查看。请立即复制并妥善保存。</span>
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary btn-lg" @click="copyToken">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制 Token
          </button>
          <button class="btn btn-ghost btn-lg" @click="tokenModal = null">我已保存</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive, onMounted } = Vue;
    const http = axios.create();
    http.interceptors.request.use((config) => {
      const token = localStorage.getItem('admin_token');
      if (token) config.headers.Authorization = 'Bearer ' + token;
      return config;
    });
    http.interceptors.response.use(null, (err) => {
      if (err.response?.status === 401) { localStorage.removeItem('admin_token'); window.location.href = '/login.html'; }
      return Promise.reject(err);
    });

    createApp({
      setup() {
        const tab = ref('files');
        const files = reactive({ items: [], total: 0, page: 1, totalPages: 0 });
        const tokens = reactive({ items: [], total: 0, page: 1, totalPages: 0 });
        const newToken = reactive({ name: '', description: '', expiresAt: '' });
        const tokenModal = ref(null);

        const formatSize = (b) => { if (!b) return '0 B'; const u = ['B','KB','MB','GB']; let i = 0, s = Number(b); while (s >= 1024 && i < u.length - 1) { s /= 1024; i++; } return s.toFixed(2) + ' ' + u[i]; };
        const formatDate = (d) => d ? new Date(d).toLocaleString('zh-CN') : '-';

        const loadFiles = async (page = 1) => {
          try { const res = await http.get('/admin/files', { params: { page, limit: 20 } }); Object.assign(files, res.data.data || res.data); } catch (e) { console.error(e); }
        };
        const loadTokens = async (page = 1) => {
          try { const res = await http.get('/admin/tokens', { params: { page, limit: 20 } }); Object.assign(tokens, res.data.data || res.data); } catch (e) { console.error(e); }
        };
        const deleteFile = async (id) => {
          if (!confirm('确认删除此文件？将同时删除物理文件。')) return;
          try { await http.delete(`/admin/files/${id}`); loadFiles(files.page); } catch (e) { alert(e.response?.data?.message || '删除失败'); }
        };
        const createToken = async () => {
          if (!newToken.name) { alert('请输入名称'); return; }
          try { const res = await http.post('/admin/tokens', { ...newToken }); tokenModal.value = res.data.data || res.data; newToken.name = ''; newToken.description = ''; newToken.expiresAt = ''; loadTokens(1); } catch (e) { alert(e.response?.data?.message || '创建失败'); }
        };
        const toggleToken = async (id, enabled) => {
          try { await http.patch(`/admin/tokens/${id}/${enabled ? 'enable' : 'disable'}`); loadTokens(tokens.page); } catch (e) { alert(e.response?.data?.message || '操作失败'); }
        };
        const rotateToken = async (id) => {
          if (!confirm('确认轮换此 Token？旧 Token 将立即失效。')) return;
          try { const res = await http.patch(`/admin/tokens/${id}/rotate`); tokenModal.value = res.data.data || res.data; loadTokens(tokens.page); } catch (e) { alert(e.response?.data?.message || '轮换失败'); }
        };
        const deleteToken = async (id) => {
          if (!confirm('确认删除此 Token？')) return;
          try { await http.delete(`/admin/tokens/${id}`); loadTokens(tokens.page); } catch (e) { alert(e.response?.data?.message || '删除失败'); }
        };
        const copyUrl = (url) => { navigator.clipboard.writeText(url).then(() => alert('已复制')); };
        const copyToken = () => { navigator.clipboard.writeText(tokenModal.value.token).then(() => alert('已复制')); };
        const logout = () => { localStorage.removeItem('admin_token'); window.location.href = '/login.html'; };

        onMounted(() => {
          const t = localStorage.getItem('admin_token');
          if (!t) { window.location.href = '/login.html'; return; }
          loadFiles(1); loadTokens(1);
        });

        return { tab, files, tokens, newToken, tokenModal, loadFiles, loadTokens, deleteFile, createToken, toggleToken, rotateToken, deleteToken, copyUrl, copyToken, logout, formatSize, formatDate };
      },
    }).mount('#app');
  </script>
</body>
</html>
