<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Service - 管理后台</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F1F5F9; color: #1E293B; min-height: 100vh; }

    /* Sidebar Layout */
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #0F172A; color: #E2E8F0; padding: 24px 0; display: flex; flex-direction: column; }
    .sidebar-brand { padding: 0 24px 28px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand svg { width: 28px; height: 28px; color: #3B82F6; }
    .sidebar-brand span { font-size: 17px; font-weight: 700; color: #fff; }
    .sidebar-nav { padding: 20px 12px; flex: 1; }
    .sidebar-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #64748B; padding: 0 12px; margin-bottom: 8px; margin-top: 20px; }
    .sidebar-label:first-child { margin-top: 0; }
    .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: #94A3B8; }
    .sidebar-item:hover { background: rgba(255,255,255,0.06); color: #E2E8F0; }
    .sidebar-item.active { background: #1E293B; color: #fff; }
    .sidebar-item svg { width: 18px; height: 18px; }
    .sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.06); }
    .btn-logout { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #64748B; cursor: pointer; transition: color 0.15s; background: none; border: none; font-family: inherit; }
    .btn-logout:hover { color: #F87171; }
    .btn-logout svg { width: 16px; height: 16px; }

    /* Main */
    .main { flex: 1; padding: 32px; overflow-y: auto; }
    .main-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .main-title { font-size: 22px; font-weight: 700; color: #0F172A; }
    .main-subtitle { font-size: 14px; color: #64748B; margin-top: 2px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #E2E8F0; }
    .stat-label { font-size: 12px; font-weight: 500; color: #64748B; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 28px; font-weight: 700; color: #0F172A; margin-top: 4px; }
    .stat-value.blue { color: #2563EB; }
    .stat-value.green { color: #16A34A; }

    /* Table Card */
    .table-card { background: #fff; border-radius: 12px; border: 1px solid #E2E8F0; overflow: hidden; }
    .table-header { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #E2E8F0; }
    .table-title { font-size: 15px; font-weight: 600; color: #1E293B; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 12px 20px; text-align: left; font-size: 12px; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: 0.04em; background: #F8FAFC; border-bottom: 1px solid #E2E8F0; }
    td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid #F1F5F9; color: #334155; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FAFBFC; }
    .td-mono { font-family: 'SF Mono', monospace; font-size: 13px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
    .btn svg { width: 14px; height: 14px; }
    .btn-primary { background: #2563EB; color: #fff; }
    .btn-primary:hover { background: #1D4ED8; }
    .btn-danger { background: #FEE2E2; color: #DC2626; }
    .btn-danger:hover { background: #FECACA; }
    .btn-warning { background: #FEF3C7; color: #D97706; }
    .btn-warning:hover { background: #FDE68A; }
    .btn-success { background: #DCFCE7; color: #16A34A; }
    .btn-success:hover { background: #BBF7D0; }
    .btn-ghost { background: #F1F5F9; color: #475569; }
    .btn-ghost:hover { background: #E2E8F0; }
    .btn-create { padding: 10px 20px; font-size: 14px; font-weight: 600; }

    /* Badge */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }
    .badge-green { background: #DCFCE7; color: #16A34A; }
    .badge-red { background: #FEE2E2; color: #DC2626; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
    .badge-green .badge-dot { background: #16A34A; }
    .badge-red .badge-dot { background: #DC2626; }

    /* Form row */
    .create-form { display: flex; gap: 12px; align-items: flex-end; padding: 20px 24px; background: #F8FAFC; border-bottom: 1px solid #E2E8F0; }
    .create-form .field { flex: 1; }
    .create-form label { display: block; font-size: 12px; font-weight: 500; color: #64748B; margin-bottom: 4px; }
    .create-form input { width: 100%; padding: 8px 12px; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; transition: all 0.15s; }
    .create-form input:focus { border-color: #2563EB; box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }

    /* Pagination */
    .pagination { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-top: 1px solid #E2E8F0; }
    .pagination-info { font-size: 13px; color: #64748B; }
    .pagination-btns { display: flex; gap: 6px; }
    .pagination-btns button { padding: 6px 14px; border: 1px solid #E2E8F0; background: #fff; border-radius: 7px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; color: #475569; }
    .pagination-btns button:hover:not(:disabled) { background: #F1F5F9; border-color: #CBD5E1; }
    .pagination-btns button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination-btns button.active { background: #2563EB; color: #fff; border-color: #2563EB; }

    /* Empty */
    .empty { padding: 60px 24px; text-align: center; color: #94A3B8; }
    .empty svg { width: 48px; height: 48px; margin-bottom: 12px; color: #CBD5E1; }
    .empty p { font-size: 14px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal { background: #fff; border-radius: 16px; padding: 32px; width: 520px; max-width: 90vw; box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
    .modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .modal-header svg { width: 22px; height: 22px; color: #16A34A; }
    .modal-header h3 { font-size: 18px; font-weight: 700; color: #0F172A; }
    .modal p { font-size: 14px; color: #475569; margin-bottom: 12px; }
    .token-display { background: #F8FAFC; padding: 16px; border-radius: 10px; word-break: break-all; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; margin: 16px 0; border: 1px solid #E2E8F0; color: #1E293B; line-height: 1.5; }
    .token-warning { display: flex; align-items: flex-start; gap: 8px; background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 8px; padding: 12px 14px; color: #92400E; font-size: 13px; margin-top: 16px; }
    .token-warning svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; color: #D97706; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; justify-content: center; padding: 10px; font-weight: 600; font-size: 14px; }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { padding: 20px; }
      .create-form { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>File Service</span>
        </div>
        <nav class="sidebar-nav">
          <div class="sidebar-label">概览</div>
          <div class="sidebar-item" :class="{ active: tab === 'files' }" @click="tab = 'files'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
            文件管理
          </div>
          <div class="sidebar-item" :class="{ active: tab === 'tokens' }" @click="tab = 'tokens'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
            Token 管理
          </div>
        </nav>
        <div class="sidebar-footer">
          <button class="btn-logout" @click="logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            退出登录
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main">
        <!-- Files Tab -->
        <template v-if="tab === 'files'">
          <div class="main-header">
            <div>
              <div class="main-title">文件管理</div>
              <div class="main-subtitle">管理所有上传的文件</div>
            </div>
          </div>
          <div class="stats">
            <div class="stat-card">
              <div class="stat-label">总文件数</div>
              <div class="stat-value blue">{{ files.total }}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">当前页</div>
              <div class="stat-value">{{ files.page }} / {{ files.totalPages || 1 }}</div>
            </div>
          </div>
          <div class="table-card">
            <div class="table-header">
              <div class="table-title">文件列表</div>
            </div>
            <table v-if="files.items.length">
              <thead><tr><th>ID</th><th>文件名</th><th>大小</th><th>类型</th><th>来源</th><th>上传时间</th><th>操作</th></tr></thead>
              <tbody>
                <tr v-for="f in files.items" :key="f.id">
                  <td class="td-mono">{{ f.id }}</td>
                  <td style="font-weight:500">{{ f.originalName }}</td>
                  <td>{{ formatSize(f.size) }}</td>
                  <td><span style="font-size:12px;color:#64748B">{{ f.mimeType }}</span></td>
                  <td>{{ f.tokenName || '-' }}</td>
                  <td style="font-size:13px;color:#64748B">{{ formatDate(f.uploadedAt) }}</td>
                  <td>
                    <button class="btn btn-ghost" @click="copyUrl(f.fullUrl)">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                      复制
                    </button>
                    <button class="btn btn-danger" @click="deleteFile(f.id)">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                      删除
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
            <div v-else class="empty">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
              <p>暂无文件</p>
            </div>
            <div class="pagination">
              <div class="pagination-info">共 {{ files.total }} 条记录</div>
              <div class="pagination-btns">
                <button @click="loadFiles(files.page - 1)" :disabled="files.page <= 1">上一页</button>
                <button @click="loadFiles(files.page + 1)" :disabled="files.page >= files.totalPages">下一页</button>
              </div>
            </div>
          </div>
        </template>

        <!-- Tokens Tab -->
        <template v-if="tab === 'tokens'">
          <div class="main-header">
            <div>
              <div class="main-title">Token 管理</div>
              <div class="main-subtitle">管理 Upload Token 的创建、启用和轮换</div>
            </div>
          </div>
          <div class="stats">
            <div class="stat-card">
              <div class="stat-label">总 Token</div>
              <div class="stat-value blue">{{ tokens.total }}</div>
            </div>
          </div>
          <div class="table-card">
            <div class="create-form">
              <div class="field"><label>名称 *</label><input v-model="newToken.name" placeholder="签发对象名称" /></div>
              <div class="field"><label>描述</label><input v-model="newToken.description" placeholder="可选描述" /></div>
              <div class="field"><label>过期时间</label><input v-model="newToken.expiresAt" type="datetime-local" /></div>
              <button class="btn btn-primary btn-create" @click="createToken">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                创建
              </button>
            </div>
            <table v-if="tokens.items.length">
              <thead><tr><th>ID</th><th>名称</th><th>前缀</th><th>描述</th><th>状态</th><th>最后使用</th><th>创建时间</th><th>操作</th></tr></thead>
              <tbody>
                <tr v-for="t in tokens.items" :key="t.id">
                  <td class="td-mono">{{ t.id }}</td>
                  <td style="font-weight:500">{{ t.name }}</td>
                  <td class="td-mono">{{ t.tokenPrefix }}***</td>
                  <td style="color:#64748B">{{ t.description || '-' }}</td>
                  <td><span class="badge" :class="t.enabled ? 'badge-green' : 'badge-red'"><span class="badge-dot"></span>{{ t.enabled ? '启用' : '禁用' }}</span></td>
                  <td style="font-size:13px;color:#64748B">{{ t.lastUsedAt ? formatDate(t.lastUsedAt) : '-' }}</td>
                  <td style="font-size:13px;color:#64748B">{{ formatDate(t.createdAt) }}</td>
                  <td>
                    <button v-if="t.enabled" class="btn btn-warning" @click="toggleToken(t.id, false)">禁用</button>
                    <button v-else class="btn btn-success" @click="toggleToken(t.id, true)">启用</button>
                    <button class="btn btn-ghost" @click="rotateToken(t.id)">轮换</button>
                    <button class="btn btn-danger" @click="deleteToken(t.id)">删除</button>
                  </td>
                </tr>
              </tbody>
            </table>
            <div v-else class="empty">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
              <p>暂无 Token，创建一个开始使用</p>
            </div>
            <div class="pagination">
              <div class="pagination-info">共 {{ tokens.total }} 条记录</div>
              <div class="pagination-btns">
                <button @click="loadTokens(tokens.page - 1)" :disabled="tokens.page <= 1">上一页</button>
                <button @click="loadTokens(tokens.page + 1)" :disabled="tokens.page >= tokens.totalPages">下一页</button>
              </div>
            </div>
          </div>
        </template>
      </main>
    </div>

    <!-- Token Modal -->
    <div v-if="tokenModal" class="modal-overlay" @click.self="tokenModal = null">
      <div class="modal">
        <div class="modal-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <h3>Token 已创建</h3>
        </div>
        <p><strong>{{ tokenModal.name }}</strong></p>
        <div class="token-display">{{ tokenModal.token }}</div>
        <div class="token-warning">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>此 Token 仅显示一次，关闭后无法再次查看。请立即复制并妥善保存。</span>
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary" @click="copyToken">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制 Token
          </button>
          <button class="btn btn-ghost" @click="tokenModal = null">我已保存</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive, onMounted } = Vue;
    const http = axios.create();
    http.interceptors.request.use((config) => {
      const token = localStorage.getItem('admin_token');
      if (token) config.headers.Authorization = 'Bearer ' + token;
      return config;
    });
    http.interceptors.response.use(null, (err) => {
      if (err.response?.status === 401) { localStorage.removeItem('admin_token'); window.location.href = '/login.html'; }
      return Promise.reject(err);
    });

    createApp({
      setup() {
        const tab = ref('files');
        const files = reactive({ items: [], total: 0, page: 1, totalPages: 0 });
        const tokens = reactive({ items: [], total: 0, page: 1, totalPages: 0 });
        const newToken = reactive({ name: '', description: '', expiresAt: '' });
        const tokenModal = ref(null);

        const formatSize = (b) => { if (!b) return '0 B'; const u = ['B','KB','MB','GB']; let i = 0, s = b; while (s >= 1024 && i < u.length - 1) { s /= 1024; i++; } return s.toFixed(2) + ' ' + u[i]; };
        const formatDate = (d) => d ? new Date(d).toLocaleString('zh-CN') : '-';

        const loadFiles = async (page = 1) => {
          try { const res = await http.get('/admin/files', { params: { page, limit: 20 } }); Object.assign(files, res.data.data || res.data); } catch (e) { console.error(e); }
        };
        const loadTokens = async (page = 1) => {
          try { const res = await http.get('/admin/tokens', { params: { page, limit: 20 } }); Object.assign(tokens, res.data.data || res.data); } catch (e) { console.error(e); }
        };
        const deleteFile = async (id) => {
          if (!confirm('确认删除此文件？将同时删除物理文件。')) return;
          try { await http.delete(`/admin/files/${id}`); loadFiles(files.page); } catch (e) { alert(e.response?.data?.message || '删除失败'); }
        };
        const createToken = async () => {
          if (!newToken.name) { alert('请输入名称'); return; }
          try { const res = await http.post('/admin/tokens', { ...newToken }); tokenModal.value = res.data.data || res.data; newToken.name = ''; newToken.description = ''; newToken.expiresAt = ''; loadTokens(1); } catch (e) { alert(e.response?.data?.message || '创建失败'); }
        };
        const toggleToken = async (id, enabled) => {
          try { await http.patch(`/admin/tokens/${id}/${enabled ? 'enable' : 'disable'}`); loadTokens(tokens.page); } catch (e) { alert(e.response?.data?.message || '操作失败'); }
        };
        const rotateToken = async (id) => {
          if (!confirm('确认轮换此 Token？旧 Token 将立即失效。')) return;
          try { const res = await http.patch(`/admin/tokens/${id}/rotate`); tokenModal.value = res.data.data || res.data; loadTokens(tokens.page); } catch (e) { alert(e.response?.data?.message || '轮换失败'); }
        };
        const deleteToken = async (id) => {
          if (!confirm('确认删除此 Token？')) return;
          try { await http.delete(`/admin/tokens/${id}`); loadTokens(tokens.page); } catch (e) { alert(e.response?.data?.message || '删除失败'); }
        };
        const copyUrl = (url) => { navigator.clipboard.writeText(url).then(() => alert('已复制')); };
        const copyToken = () => { navigator.clipboard.writeText(tokenModal.value.token).then(() => alert('已复制')); };
        const logout = () => { localStorage.removeItem('admin_token'); window.location.href = '/login.html'; };

        onMounted(() => {
          const t = localStorage.getItem('admin_token');
          if (!t) { window.location.href = '/login.html'; return; }
          loadFiles(1); loadTokens(1);
        });
